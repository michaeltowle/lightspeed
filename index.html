<!DOCTYPE html>
<!--
  Bank browser (WIREFRAME — intentionally plain; final design via Claude Design).

  - Lists tags, each with its approved-problem count.
  - Clicking a tag expands an ordered list of its problems (LaTeX + attempt stats).
  - Selection is global across tags and toggled by CLICKING A PROBLEM ROW (no
    checkbox); a selected problem stays selected when viewed under another tag.
  - Each row shows attempt stats: total attempts, quiz attempts, and percent
    correct (total, plus quiz / practice splits).
  - "quiz" and "practice" enable once MORE THAN ONE problem is selected.
  - Quiz = timed, Practice = untimed; both hand the selected problem ids to the
    quiz page via the URL.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>lightspeed — bank</title>
  <script>
    MathJax = { tex: { inlineMath: [["\\(", "\\)"]], displayMath: [["$$", "$$"]] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  <style>
    /* Deliberately monochrome wireframe styling. */
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #000; }
    h1 { font-size: 1.3rem; }
    .bar { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #000; padding: .6rem 0; display: flex; gap: .6rem; align-items: center; }
    .bar .sel { font-size: .85rem; color: #444; margin-right: auto; }
    button { font-family: inherit; font-size: .9rem; padding: .35rem .9rem; border: 1px solid #000; background: #fff; color: #000; cursor: pointer; }
    button:disabled { color: #999; border-color: #999; cursor: not-allowed; }
    ul.tags { list-style: none; padding: 0; margin: 1rem 0; }
    li.tag { border: 1px solid #888; margin: .4rem 0; }
    .taghead { padding: .5rem .7rem; cursor: pointer; display: flex; justify-content: space-between; background: #f4f4f4; }
    .taghead .count { color: #444; }
    ol.problems { margin: 0; padding: .3rem .7rem .7rem 2rem; }
    ol.problems li.prow { margin: .3rem 0; padding: .3rem .5rem; cursor: pointer; user-select: none; border: 1px solid transparent; border-radius: 2px; }
    ol.problems li.prow:hover { background: #f7f7f7; }
    ol.problems li.prow.selected { background: #ececec; border-color: #000; border-left-width: 4px; }
    ol.problems .empty { list-style: none; margin-left: -1.3rem; color: #777; font-style: italic; }
    .pq { display: block; }
    .pq .pqline + .pqline { margin-top: 2px; }
    .stats { display: block; margin-top: .15rem; }
    .muted { color: #777; font-size: .85rem; }
  </style>
</head>
<body>
  <h1>problem bank</h1>

  <div class="bar">
    <span class="sel">0 selected</span>
    <button id="quizBtn" disabled>quiz (timed)</button>
    <button id="practiceBtn" disabled>practice</button>
  </div>

  <p id="empty" class="muted" hidden>no tags yet. approve some problems at
    <a href="/add-problems">/add-problems</a> first.</p>

  <ul class="tags" id="tags"></ul>

  <p id="staged-link" hidden><a href="/add-problems"></a></p>

<script>
const selected = new Set();          // global selection of problem ids
const problemCache = {};             // tag_id -> problems[]

// Problem text may be multi-line (\n-separated); render one math block per line.
const pqLines = (tex) => tex.split("\n").map((s) => `<div class="pqline">\\(${s.trim()}\\)</div>`).join("");

async function api(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function load() {
  const [tags, batches] = await Promise.all([api("/api/tags"), api("/api/staged")]);
  document.getElementById("empty").hidden = tags.length > 0;
  const ul = document.getElementById("tags");
  ul.innerHTML = "";
  for (const t of tags) ul.appendChild(renderTag(t));
  refreshBar();

  const n = batches.reduce((s, b) => s + b.problems.length, 0);
  if (n > 0) {
    const p = document.getElementById("staged-link");
    p.querySelector("a").textContent = `${n} problem${n === 1 ? "" : "s"} staged`;
    p.hidden = false;
  }
}

function renderTag(t) {
  const li = document.createElement("li");
  li.className = "tag";
  li.innerHTML = `
    <div class="taghead">
      <span>${escapeHtml(t.display_text)}</span>
      <span class="count">${t.attempted_count}/${t.problem_count}</span>
    </div>`;
  const body = document.createElement("ol");
  body.className = "problems";
  body.hidden = true;
  li.appendChild(body);

  li.querySelector(".taghead").onclick = async () => {
    if (body.hidden && !problemCache[t.id]) {
      problemCache[t.id] = await api(`/api/problems?tag=${t.id}`);
      renderProblems(body, problemCache[t.id]);
    }
    body.hidden = !body.hidden;
  };
  return li;
}

function renderProblems(ol, problems) {
  ol.innerHTML = "";
  if (!problems.length) {
    ol.innerHTML = `<li class="empty">no approved problems with this tag</li>`;
    return;
  }
  for (const p of problems) {
    const li = document.createElement("li");
    li.className = "prow";
    li.dataset.id = p.id;
    if (selected.has(p.id)) li.classList.add("selected");

    const pq = document.createElement("span");
    pq.className = "pq";
    pq.innerHTML = pqLines(p.latex_problem_text);

    const stats = document.createElement("span");
    stats.className = "stats muted";
    stats.textContent = statsLine(p);

    li.append(pq, stats);
    li.onclick = () => toggleSelect(p.id);
    ol.appendChild(li);
  }
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise([ol]);
}

function statsLine(p) {
  if (!p.total_attempts) return "no attempts yet";
  const pct = v => (v === null || v === undefined ? "—" : `${v}%`);
  return `${p.total_attempts} attempts (${p.quiz_attempts} quiz) · `
       + `${pct(p.pct_total)} correct — quiz ${pct(p.pct_quiz)}, `
       + `practice ${pct(p.pct_practice)}`;
}

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  // a problem can appear under multiple tags — keep every rendered row in sync
  document.querySelectorAll(`li.prow[data-id="${id}"]`).forEach(row =>
    row.classList.toggle("selected", selected.has(id))
  );
  refreshBar();
}

function refreshBar() {
  const n = selected.size;
  document.querySelector(".sel").textContent = `${n} selected`;
  const enabled = n > 1;                       // de-gray once >1 selected
  document.getElementById("quizBtn").disabled = !enabled;
  document.getElementById("practiceBtn").disabled = !enabled;
}

function goToSet(timed) {
  const ids = [...selected].join(",");
  location.href = `/quiz?timed=${timed ? 1 : 0}&ids=${ids}`;
}
document.getElementById("quizBtn").onclick = () => goToSet(true);
document.getElementById("practiceBtn").onclick = () => goToSet(false);

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

load();
</script>
</body>
</html>

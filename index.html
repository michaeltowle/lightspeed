<!DOCTYPE html>
<!--
  Bank browser (WIREFRAME — intentionally plain; final design via Claude Design).

  - Lists types, each with its approved-problem count.
  - Clicking a type expands an ordered list of its problems (decomposed fields +
    attempt stats).
  - Selection is global across types and toggled by CLICKING A PROBLEM ROW (no
    checkbox); a selected problem stays selected when viewed under another type.
  - Each row shows attempt stats: total attempts, percent correct, average time.
  - "start set" enables once MORE THAN ONE problem is selected, and hands the
    selected problem ids to the run page via /set?ids=...
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lightspeed</title>
  <script>
    MathJax = { tex: { inlineMath: [["\\(", "\\)"]], displayMath: [["$$", "$$"]] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  <style>
    /* Deliberately monochrome wireframe styling. */
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #000; }
    h1 { font-size: 1.3rem; }
    .bar { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #000; padding: .6rem 0; display: flex; gap: .6rem; align-items: center; }
    .bar .sel { font-size: .85rem; color: #444; margin-right: auto; }
    button { font-family: inherit; font-size: .9rem; padding: .35rem .9rem; border: 1px solid #000; background: #fff; color: #000; cursor: pointer; }
    button:disabled { color: #999; border-color: #999; cursor: not-allowed; }
    ul.types { list-style: none; padding: 0; margin: 1rem 0; }
    li.type { border: 1px solid #888; margin: .4rem 0; }
    .typehead { padding: .5rem .7rem; cursor: pointer; display: flex; justify-content: space-between; background: #f4f4f4; }
    .typehead .count { color: #444; }
    ol.problems { margin: 0; padding: .3rem .7rem .7rem 2rem; }
    ol.problems li.prow { margin: .3rem 0; padding: .3rem .5rem; cursor: pointer; user-select: none; border: 1px solid transparent; border-radius: 2px; }
    ol.problems li.prow:hover { background: #f7f7f7; }
    ol.problems li.prow.selected { background: #ececec; border-color: #000; border-left-width: 4px; }
    ol.problems .empty { list-style: none; margin-left: -1.3rem; color: #777; font-style: italic; }
    .pq { display: block; }
    .pq .instr { font-size: .8rem; color: #777; text-transform: lowercase; }
    .pq .mline + .mline { margin-top: 2px; }
    .stats { display: block; margin-top: .15rem; }
    .muted { color: #777; font-size: .85rem; }
  </style>
</head>
<body>
  <h1>limitations are in the mind.</h1>

  <div class="bar">
    <span class="sel">0 selected</span>
    <button id="startBtn" disabled>start set</button>
  </div>

  <p id="empty" class="muted" hidden>no types yet. approve some problems at
    <a href="/add-problems">/add-problems</a> first.</p>

  <ul class="types" id="types"></ul>

  <p id="staged-link" hidden><a href="/add-problems"></a></p>

<script>
const selected = new Set();          // global selection of problem ids
const problemCache = {};             // type_id -> problems[]

const FORMULAS    = ["formula_1", "formula_2", "formula_3"];
const EXPRESSIONS = ["expression_1", "expression_2", "expression_3"];

// Render a problem from its decomposed fields: prose instruction, then each
// non-empty formula/expression as its own math line. Empty fields are skipped.
function renderStatement(p) {
  let html = "";
  if (p.instructions) html += `<div class="instr">${escapeHtml(p.instructions)}</div>`;
  for (const f of FORMULAS)    if (p[f]) html += `<div class="mline">\\(${p[f]}\\)</div>`;
  for (const e of EXPRESSIONS) if (p[e]) html += `<div class="mline">\\(${p[e]}\\)</div>`;
  return html;
}

async function api(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function load() {
  const [types, batches] = await Promise.all([api("/api/types"), api("/api/staged")]);
  document.getElementById("empty").hidden = types.length > 0;
  const ul = document.getElementById("types");
  ul.innerHTML = "";
  for (const t of types) ul.appendChild(renderType(t));
  refreshBar();

  const n = batches.reduce((s, b) => s + b.problems.length, 0);
  if (n > 0) {
    const p = document.getElementById("staged-link");
    p.querySelector("a").textContent = `${n} problem${n === 1 ? "" : "s"} staged`;
    p.hidden = false;
  }
}

function renderType(t) {
  const li = document.createElement("li");
  li.className = "type";
  li.innerHTML = `
    <div class="typehead">
      <span>${escapeHtml(t.name)}</span>
      <span class="count">${t.attempted_count}/${t.problem_count}</span>
    </div>`;
  const body = document.createElement("ol");
  body.className = "problems";
  body.hidden = true;
  li.appendChild(body);

  li.querySelector(".typehead").onclick = async () => {
    if (body.hidden && !problemCache[t.id]) {
      problemCache[t.id] = await api(`/api/problems?type=${t.id}`);
      renderProblems(body, problemCache[t.id]);
    }
    body.hidden = !body.hidden;
  };
  return li;
}

function renderProblems(ol, problems) {
  ol.innerHTML = "";
  if (!problems.length) {
    ol.innerHTML = `<li class="empty">no approved problems of this type</li>`;
    return;
  }
  for (const p of problems) {
    const li = document.createElement("li");
    li.className = "prow";
    li.dataset.id = p.id;
    if (selected.has(p.id)) li.classList.add("selected");

    const pq = document.createElement("span");
    pq.className = "pq";
    pq.innerHTML = renderStatement(p);

    const stats = document.createElement("span");
    stats.className = "stats muted";
    stats.textContent = statsLine(p);

    li.append(pq, stats);
    li.onclick = () => toggleSelect(p.id);
    ol.appendChild(li);
  }
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise([ol]);
}

function statsLine(p) {
  if (!p.total_attempts) return "no attempts yet";
  const pct = p.pct_total === null || p.pct_total === undefined ? "—" : `${p.pct_total}%`;
  const avg = p.avg_seconds === null || p.avg_seconds === undefined ? "" : ` · avg ${p.avg_seconds}s`;
  return `${p.total_attempts} attempt${p.total_attempts === 1 ? "" : "s"} · ${pct} correct${avg}`;
}

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  // a problem can appear under multiple types — keep every rendered row in sync
  document.querySelectorAll(`li.prow[data-id="${id}"]`).forEach(row =>
    row.classList.toggle("selected", selected.has(id))
  );
  refreshBar();
}

function refreshBar() {
  const n = selected.size;
  document.querySelector(".sel").textContent = `${n} selected`;
  document.getElementById("startBtn").disabled = n <= 1;   // de-gray once >1 selected
}

function goToSet() {
  const ids = [...selected].join(",");
  location.href = `/set?ids=${ids}`;
}
document.getElementById("startBtn").onclick = goToSet;

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

load();
</script>
</body>
</html>

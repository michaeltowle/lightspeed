<!DOCTYPE html>
<!--
  Bank browser + problem-set builder (WIREFRAME — final design via Claude Design).

  LEFT: type cards, 4 across. Each type is one 16×16px square per approved
  problem (1px gap, max 10/row, wrapping left-aligned), name centered above, thin
  border. Periwinkle squares; locked types go medium-light gray (square + border
  + name) and sort to the bottom. Click a card to (de)select it — border + name
  go dark purple.

  RIGHT: the problemset-builder sidebar. Top toggles:
    - draw:     random | evenly random            (sampling mode, for launch)
    - attempts: unattempted | attempted | all     (filter by attempt status)
    - of those: incorrect | all                   (only when attempts=attempted;
                                                    "incorrect" = most-recent grade wrong)
  Then a bullet list of the selected types, each with easy/medium/hard buttons
  (independently toggleable; a difficulty absent from a type is disabled).
  Then a PREVIEW: for every selected (type × difficulty) it shows the FIRST
  (lowest problem_id) problem matching that combo AND the attempt/correct
  filters. It is deliberately NOT what you'll actually see (no randomization) —
  it conveys the set's scope and character, not the exact problems.

  (Launch/start is not wired yet — the "draw" mode is captured but unused here.)
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lightspeed</title>
  <script>
    MathJax = { tex: { inlineMath: [["\\(", "\\)"]] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  <style>
    :root { --sq: #8c9eff; --sq-locked: #c2c2c2; --name: #d9c9f2; --selected: #5b21b6; }

    body { font-family: system-ui, sans-serif; max-width: 1260px; margin: 2rem auto; padding: 0 1rem; color: #000; }
    h1 { font-size: 1.3rem; }
    .bar { display: flex; gap: .6rem; align-items: center; padding: .6rem 0; border-bottom: 1px solid #000; }
    .bar a.navlink { font-size: .85rem; color: #000; text-decoration: underline; }

    .layout { display: flex; gap: 1.5rem; align-items: flex-start; margin-top: 1.4rem; }

    /* LEFT: type cards, 4 across */
    .cards { display: grid; grid-template-columns: repeat(4, 200px); gap: 1.5rem 1.25rem; align-items: start; }
    .type {
      width: 200px; box-sizing: border-box;
      border: 1px solid #e3e3e3; padding: 8px 6px; cursor: pointer; user-select: none;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
    }
    .type.locked-first { grid-column-start: 1; }
    .cell-name { color: var(--name); font-size: .8rem; font-weight: 600; line-height: 1.2; text-align: center; }
    .squares { display: flex; flex-wrap: wrap; gap: 1px; max-width: 169px; }  /* 10×16 + 9×1 = 169 */
    .sq { width: 16px; height: 16px; background: var(--sq); }
    .type.locked .sq { background: var(--sq-locked); }
    .type.locked { border-color: var(--sq-locked); }
    .type.locked .cell-name { color: var(--sq-locked); }
    .type.selected { border-color: var(--selected); }
    .type.selected .cell-name { color: var(--selected); }

    /* RIGHT: problemset builder */
    .builder { position: sticky; top: 1rem; flex: none; width: 320px;
      border: 1px solid #ccc; border-radius: 4px; padding: .8rem .9rem;
      max-height: calc(100vh - 2rem); overflow: auto; }
    .builder h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: #555; margin: 0 0 .7rem; }
    .tgroup { margin-bottom: .55rem; }
    .tgroup.disabled { opacity: .4; pointer-events: none; }
    .tgroup .lbl { font-size: .66rem; text-transform: uppercase; letter-spacing: .04em; color: #999; display: block; margin-bottom: .2rem; }
    .tg { display: inline-flex; border: 1px solid #bbb; border-radius: 3px; overflow: hidden; }
    .tg button { font: inherit; font-size: .74rem; padding: .2rem .55rem; border: none; border-right: 1px solid #ddd; background: #fff; color: #444; cursor: pointer; }
    .tg button:last-child { border-right: none; }
    .tg button.on { background: var(--selected); color: #fff; }

    .typelist { margin: .8rem 0; padding-left: 1.1rem; }
    .typelist li { margin: .35rem 0; font-size: .82rem; }
    .typelist .tname { margin-right: .45rem; }
    .dbtns { display: inline-flex; gap: .2rem; vertical-align: middle; }
    .dbtn { font: inherit; font-size: .64rem; text-transform: uppercase; letter-spacing: .03em;
      padding: .05rem .32rem; border: 1px solid #ccc; border-radius: 2px; background: #fff; color: #888; cursor: pointer; }
    .dbtn.on { background: #333; color: #fff; border-color: #333; }
    .dbtn:disabled { opacity: .3; cursor: not-allowed; }

    .preview { border-top: 1px solid #eee; margin-top: .6rem; padding-top: .5rem; }
    .preview .phead { font-size: .66rem; text-transform: uppercase; letter-spacing: .04em; color: #999; margin-bottom: .3rem; }
    .pcell { margin: .45rem 0; padding-bottom: .45rem; border-bottom: 1px solid #f2f2f2; }
    .pcell .plabel { font-size: .64rem; text-transform: uppercase; letter-spacing: .03em; color: #aaa; margin-bottom: .15rem; }
    .pcell .instr { font-size: .76rem; color: #777; }
    .pcell .mline { font-size: .82rem; }
    .pcell .mline + .mline { margin-top: 1px; }
    .muted { color: #999; font-size: .8rem; }
  </style>
</head>
<body>
  <h1>limitations are in the mind.</h1>

  <div class="bar">
    <a href="/types" class="navlink">types</a>
    <a href="/staged" class="navlink">staged</a>
  </div>

  <p id="empty" hidden style="color:#777">no types yet. approve some problems at
    <a href="/staged">/staged</a> first.</p>

  <div class="layout">
    <div class="cards" id="cards"></div>
    <aside class="builder" id="builder"></aside>
  </div>

  <p id="staged-link" hidden><a href="/staged"></a></p>

<script>
const DIFFS = ["easy", "medium", "hard"];

const selected = new Set();         // selected type ids (insertion order)
const typeById = {};                // id -> type object
const problemsByType = {};          // id -> [problem objects] (id-sorted, full)
const diffSel = {};                 // id -> Set of selected difficulties
const filters = { mode: "random", attempt: "all", correct: "all" };

const FORMULAS = ["formula_1", "formula_2", "formula_3"];
const EXPRESSIONS = ["expression_1", "expression_2", "expression_3"];

async function api(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function renderStatement(p) {
  let h = "";
  if (p.instructions) h += `<div class="instr">${escapeHtml(p.instructions)}</div>`;
  for (const f of FORMULAS)    if (p[f]) h += `<div class="mline">\\(${p[f]}\\)</div>`;
  for (const e of EXPRESSIONS) if (p[e]) h += `<div class="mline">\\(${p[e]}\\)</div>`;
  return h;
}

// ---- cards ----------------------------------------------------------------
function renderCell(t, locked) {
  const cell = document.createElement("div");
  cell.className = "type" + (locked ? " locked" : "");
  if (selected.has(t.id)) cell.classList.add("selected");
  cell.dataset.id = t.id;

  const name = document.createElement("div");
  name.className = "cell-name";
  name.textContent = t.default_instruction || t.name;

  const squares = document.createElement("div");
  squares.className = "squares";
  for (let i = 0; i < t.problem_count; i++) {
    const s = document.createElement("div");
    s.className = "sq";
    squares.appendChild(s);
  }

  cell.append(name, squares);
  cell.onclick = () => toggleSelect(t.id, cell);
  return cell;
}

function toggleSelect(id, cell) {
  if (selected.has(id)) { selected.delete(id); delete diffSel[id]; }
  else selected.add(id);
  cell.classList.toggle("selected", selected.has(id));
  refreshBuilder();
}

// ---- builder --------------------------------------------------------------
async function ensureProblems(tid) {
  if (!problemsByType[tid]) problemsByType[tid] = await api(`/api/problems?type=${tid}`);
  if (!diffSel[tid]) {
    const present = new Set(problemsByType[tid].map(p => p.difficulty));
    diffSel[tid] = new Set(DIFFS.filter(d => present.has(d)));   // default: all present
  }
}

// does a problem pass the global attempt/correctness filters?
function eligible(p) {
  if (filters.attempt === "unattempted" && p.total_attempts > 0) return false;
  if (filters.attempt === "attempted" && !(p.total_attempts > 0)) return false;
  if (filters.attempt === "attempted" && filters.correct === "incorrect" && p.last_correct !== 0) return false;
  return true;
}

async function refreshBuilder() {
  await Promise.all([...selected].map(ensureProblems));
  renderBuilder();
}

function tg(label, group, opts, disabled) {
  const btns = opts.map(([val, txt]) =>
    `<button data-group="${group}" data-val="${val}" class="${filters[group] === val ? "on" : ""}">${txt}</button>`
  ).join("");
  return `<div class="tgroup${disabled ? " disabled" : ""}"><span class="lbl">${label}</span><div class="tg">${btns}</div></div>`;
}

function builderHTML() {
  const corrOff = filters.attempt !== "attempted";
  let h = `<h2>problem set</h2>`;
  h += tg("draw", "mode", [["random", "random"], ["evenly", "evenly random"]], false);
  h += tg("attempts", "attempt", [["unattempted", "unattempted"], ["attempted", "attempted"], ["all", "all"]], false);
  h += tg("of those", "correct", [["incorrect", "incorrect"], ["all", "all"]], corrOff);

  if (selected.size === 0) {
    h += `<p class="muted">select one or more type cards to build a set.</p>`;
    return h;
  }
  h += `<ul class="typelist">`;
  for (const tid of selected) {
    const t = typeById[tid];
    const present = new Set((problemsByType[tid] || []).map(p => p.difficulty));
    const dbtns = DIFFS.map(d => {
      const has = present.has(d), on = diffSel[tid]?.has(d);
      return `<button class="dbtn${on ? " on" : ""}" data-tid="${tid}" data-diff="${d}" ${has ? "" : "disabled"}>${d}</button>`;
    }).join("");
    h += `<li><span class="tname">${escapeHtml(t.default_instruction || t.name)}</span><span class="dbtns">${dbtns}</span></li>`;
  }
  h += `</ul><div class="preview" id="preview"></div>`;
  return h;
}

function renderBuilder() {
  const el = document.getElementById("builder");
  el.innerHTML = builderHTML();
  el.querySelectorAll(".tg button").forEach(b => b.onclick = () => {
    filters[b.dataset.group] = b.dataset.val;
    renderBuilder();
  });
  el.querySelectorAll(".dbtn").forEach(b => { if (!b.disabled) b.onclick = () => {
    const s = diffSel[+b.dataset.tid], d = b.dataset.diff;
    s.has(d) ? s.delete(d) : s.add(d);
    renderBuilder();
  }; });
  renderPreview();
}

// Preview: first (lowest-id) problem per selected (type × difficulty), filtered.
function renderPreview() {
  const pv = document.getElementById("preview");
  if (!pv) return;
  const cells = [];
  for (const tid of selected) {
    for (const d of DIFFS) {
      if (!diffSel[tid]?.has(d)) continue;
      const first = (problemsByType[tid] || []).find(p => p.difficulty === d && eligible(p));
      if (first) cells.push({ t: typeById[tid], d, p: first });
    }
  }
  if (!cells.length) { pv.innerHTML = `<p class="muted">no problems match the current filters.</p>`; return; }
  pv.innerHTML = `<div class="phead">preview · ${cells.length} (scope, not the actual draw)</div>` +
    cells.map(c => `<div class="pcell">
        <div class="plabel">${escapeHtml(c.t.default_instruction || c.t.name)} · ${c.d}</div>
        ${renderStatement(c.p)}
      </div>`).join("");
  if (window.MathJax?.typesetPromise) MathJax.typesetPromise([pv]);
}

// ---- load -----------------------------------------------------------------
async function load() {
  const [types, batches] = await Promise.all([api("/api/types"), api("/api/staged")]);
  const withProblems = types.filter(t => t.problem_count > 0);
  document.getElementById("empty").hidden = withProblems.length > 0;
  for (const t of withProblems) typeById[t.id] = t;

  const active = withProblems.filter(t => t.status !== "locked");
  const locked = withProblems.filter(t => t.status === "locked");
  const grid = document.getElementById("cards");
  grid.innerHTML = "";
  for (const t of active) grid.appendChild(renderCell(t, false));
  locked.forEach((t, i) => {
    const cell = renderCell(t, true);
    if (i === 0) cell.classList.add("locked-first");
    grid.appendChild(cell);
  });

  renderBuilder();   // empty-state builder (toggles + hint)

  const n = batches.reduce((s, b) => s + b.problems.length, 0);
  if (n > 0) {
    const p = document.getElementById("staged-link");
    p.querySelector("a").textContent = `${n} problem${n === 1 ? "" : "s"} staged`;
    p.hidden = false;
  }
}

load();
</script>
</body>
</html>

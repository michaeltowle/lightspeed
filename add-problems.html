<!DOCTYPE html>
<!--
  Review / approve surface for STAGED problems.
  Design: design_handoff_add_problems_review/README.md

  Model:
    - APPROVE is batch-level: "Approve" button sends per-problem stars/rejects
      then flips all remaining staged problems in the batch to approved.
    - State cycles per row (click anywhere): normal -> starred -> rejected -> normal
    - Stars and rejects are tracked client-side; persisted at approve time.
    - UNDO: confirmation strip after approve offers an in-session undo.

  Tags are batch-level, assigned by Claude at generation time, shown read-only
  with db_count (already approved) + active_count (not rejected) = new_total.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>lightspeed — add problems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html { text-transform: lowercase; }

    /* KaTeX must never be lowercased — C, F, etc. are semantically significant */
    .katex, .katex * { text-transform: none; }
    .katex { font-size: 1.03em; }

    body {
      margin: 0;
      background: #f7f7f7;
      font-family: 'Spectral', Georgia, serif;
      color: #111;
    }

    /* ---- nav ---- */
    .nav {
      background: #111;
      padding: 10px 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav a { color: #999; text-decoration: none; }
    .nav a:hover { color: #fff; }
    .nav-sep { color: #555; }
    .nav-title { color: #fff; font-weight: 500; letter-spacing: 0.3px; }

    /* ---- layout ---- */
    .content {
      max-width: 820px;
      margin: 0 auto;
      padding: 28px 18px 80px;
    }

    /* ---- card ---- */
    .card {
      background: #fff;
      border-radius: 5px;
      box-shadow: 0 1px 5px rgba(0,0,0,.09), 0 0 0 1px rgba(0,0,0,.04);
      overflow: hidden;
    }

    .card-header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #fff;
      padding: 14px 18px 12px;
      border-bottom: 1px solid #ddd;
    }
    .card-title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: #111;
    }

    /* ---- batch ---- */
    .batch-wrapper {
      border-bottom: 1px solid #ddd;
    }

    .batch-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 18px;
      background: #f4f4f4;
      cursor: pointer;
      user-select: none;
    }
    .batch-header:hover { background: #ebebeb; }

    .batch-left { flex: 1; }

    .batch-prompt {
      margin: 0 0 6px;
      font-size: 15.5px;
      font-weight: 600;
      line-height: 1.35;
      color: #111;
    }

    /* tag counts */
    .tag-counts {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10.5px;
      line-height: 1.85;
    }
    .tag-row { display: flex; align-items: baseline; gap: 4px; }
    .tag-name { color: #444; font-weight: 500; }
    .tag-db   { color: #999; }
    .tag-sep  { color: #ccc; }
    .tag-active { color: #333; font-weight: 500; }
    .tag-total {
      color: #111;
      font-weight: 600;
      border-radius: 3px;
      transition: background 0.1s, color 0.1s;
    }
    .tag-total.flash {
      color: #222;
      font-weight: 700;
      background: #f0f0f0;
      padding: 0 2px;
    }
    .tag-none { color: #999; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; }

    .batch-right {
      flex: 0 0 240px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      align-self: stretch;
    }

    .btn-approve {
      font-family: 'Spectral', Georgia, serif;
      font-size: 13.5px;
      font-weight: 600;
      color: #fff;
      background: #222;
      border: none;
      padding: 7px 18px;
      border-radius: 5px;
      margin-right: 5px;
      cursor: pointer;
    }
    .btn-approve:hover:not(:disabled) { background: #111; }
    .btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- batch body ---- */
    .batch-body { padding: 5px 0 14px; }
    .batch-body.collapsed { display: none; }

    /* ---- problem rows ---- */
    .problem-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      min-height: 65px;
      border-bottom: 1px dashed #ddd;
      font-size: 15px;
      line-height: 1.4;
      cursor: pointer;
      user-select: none;
    }
    .problem-row.starred {
      background: #f5f5f5;
      box-shadow: inset 3px 0 0 0 #d4a832;
    }
    .problem-row.rejected {
      background: #fdf1f1;
      color: #c94040;
    }

    .prob-star {
      flex: 0 0 16px;
      font-size: 13px;
      color: transparent;
    }
    .problem-row.starred .prob-star { color: #666; }

    .prob-index {
      flex: 0 0 32px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #bbb;
    }
    .problem-row.starred  .prob-index { color: #444; font-weight: 500; }
    .problem-row.rejected .prob-index { color: #e08080; }

    .prob-question { flex: 1; }

    .prob-answer {
      flex: 0 0 240px;
      padding-right: 5px;
      text-align: right;
    }
    /* right-align KaTeX display blocks in the answer column */
    .prob-answer .katex-display {
      text-align: right;
      margin: 0;
    }

    /* ---- approved strip ---- */
    .approved-strip {
      background: #f2f2f2;
      padding: 15px 18px;
      font-size: 14px;
      color: #333;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .undo-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #666;
      text-decoration: underline;
      cursor: pointer;
    }
    .undo-link:hover { color: #333; }

    /* ---- empty state ---- */
    #empty {
      padding: 18px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/">← index</a>
  <span class="nav-sep">|</span>
  <span class="nav-title">add problems</span>
</nav>

<div class="content">
  <div class="card">
    <div class="card-header">
      <p class="card-title" id="card-title">loading…</p>
    </div>
    <div id="batches"></div>
    <p id="empty" hidden>no staged problems. generate some in a claude code session
      (<code>generate.stage(…)</code>), then refresh.</p>
  </div>
</div>

<!-- KaTeX JS: blocking load so it's available before the inline script runs -->
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script>
'use strict';

// ---- state ----------------------------------------------------------------
const rejected     = new Set();  // problem IDs
const starred      = new Set();  // problem IDs
const collapsed    = new Set();  // batch IDs (all start collapsed)
const approved     = new Set();  // batch IDs
const flashTimers  = new Map();  // batchId -> timeoutId
let   allBatches   = [];

// ---- helpers --------------------------------------------------------------
function math(tex) {
  return katex.renderToString(tex, { throwOnError: false, displayMode: true });
}

function esc(s) {
  return String(s).replace(/[&<>"]/g,
    c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function activeCount(batch) {
  return batch.problems.filter(p => !rejected.has(p.id)).length;
}

function updateCardTitle() {
  const total = allBatches
    .filter(b => !approved.has(b.id))
    .reduce((s, b) => s + b.problems.length, 0);
  document.getElementById('card-title').textContent =
    total > 0
      ? `${total} new problem${total === 1 ? '' : 's'} staged for approval`
      : 'all batches approved';
}

function updateTagCounts(batchId) {
  const batch = allBatches.find(b => b.id === batchId);
  if (!batch) return;
  const wrapper = document.querySelector(`[data-batch-id="${batchId}"]`);
  if (!wrapper) return;
  const ac = activeCount(batch);
  wrapper.querySelectorAll('.tag-active').forEach(el => { el.textContent = ac; });
  batch.tags.forEach(tag => {
    const el = wrapper.querySelector(`.tag-total[data-tag-id="${tag.id}"]`);
    if (el) el.textContent = (tag.db_count || 0) + ac;
  });
}

function triggerFlash(batchId) {
  if (flashTimers.has(batchId)) clearTimeout(flashTimers.get(batchId));
  const wrapper = document.querySelector(`[data-batch-id="${batchId}"]`);
  if (!wrapper) return;
  wrapper.querySelectorAll('.tag-total').forEach(el => el.classList.add('flash'));
  const tid = setTimeout(() => {
    wrapper.querySelectorAll('.tag-total').forEach(el => el.classList.remove('flash'));
    flashTimers.delete(batchId);
  }, 650);
  flashTimers.set(batchId, tid);
}

// ---- row state cycling: normal -> starred -> rejected -> normal -----------
function cycleRow(problemId, batchId, row) {
  if (rejected.has(problemId)) {
    rejected.delete(problemId);
    row.classList.remove('rejected');
    updateTagCounts(batchId);
    triggerFlash(batchId);
  } else if (starred.has(problemId)) {
    starred.delete(problemId);
    row.classList.remove('starred');
    rejected.add(problemId);
    row.classList.add('rejected');
    updateTagCounts(batchId);
    triggerFlash(batchId);
  } else {
    starred.add(problemId);
    row.classList.add('starred');
  }
}

// ---- api ------------------------------------------------------------------
async function api(path, opts) {
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
const post = obj => ({
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(obj || {}),
});

// ---- render ---------------------------------------------------------------
function renderBatch(batch) {
  const wrapper = document.createElement('div');
  wrapper.className = 'batch-wrapper';
  wrapper.dataset.batchId = batch.id;

  const ac = activeCount(batch);

  const tagCountsHtml = batch.tags.length === 0
    ? '<span class="tag-none">untagged</span>'
    : batch.tags.map(tag => {
        const db = tag.db_count || 0;
        return `<div class="tag-row">
          <span class="tag-name">${esc(tag.display_text)}:</span>
          <span class="tag-db">${db}</span>
          <span class="tag-sep">+</span>
          <span class="tag-active">${ac}</span>
          <span class="tag-sep">=</span>
          <span class="tag-total" data-tag-id="${tag.id}">${db + ac}</span>
        </div>`;
      }).join('');

  // header
  const header = document.createElement('div');
  header.className = 'batch-header';
  header.innerHTML = `
    <div class="batch-left">
      <p class="batch-prompt">${esc(batch.prompt)}</p>
      <div class="tag-counts">${tagCountsHtml}</div>
    </div>
    <div class="batch-right">
      <button class="btn-approve">approve</button>
    </div>`;

  // body
  const body = document.createElement('div');
  body.className = 'batch-body collapsed';

  batch.problems.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'problem-row';
    if (starred.has(p.id))  row.classList.add('starred');
    if (rejected.has(p.id)) row.classList.add('rejected');

    const idx = String(i + 1).padStart(2, '0');
    row.innerHTML = `
      <span class="prob-star">&#9733;</span>
      <span class="prob-index">${idx}</span>
      <span class="prob-question">${math(p.latex_problem_text)}</span>
      <span class="prob-answer">${math(p.latex_answer_text)}</span>`;

    row.onclick = () => cycleRow(p.id, batch.id, row);
    body.appendChild(row);
  });

  // approved strip (hidden until approve)
  const strip = document.createElement('div');
  strip.className = 'approved-strip';
  strip.hidden = true;

  // header click toggles collapse
  header.onclick = e => {
    if (e.target.closest('.btn-approve')) return;
    if (collapsed.has(batch.id)) {
      collapsed.delete(batch.id);
      body.classList.remove('collapsed');
    } else {
      collapsed.add(batch.id);
      body.classList.add('collapsed');
    }
  };

  // approve button
  const approveBtn = header.querySelector('.btn-approve');
  approveBtn.onclick = async e => {
    e.stopPropagation();
    approveBtn.disabled = true;
    approveBtn.textContent = 'approving…';
    try {
      const batchRejected = batch.problems.filter(p => rejected.has(p.id));
      const batchStarred  = batch.problems.filter(p => starred.has(p.id));
      for (const p of batchRejected) await api(`/api/problems/${p.id}/reject`, post());
      for (const p of batchStarred)  await api(`/api/problems/${p.id}/star`, post({ starred: true }));
      await api(`/api/batches/${batch.id}/approve`, post());

      approved.add(batch.id);
      const nAdded     = batch.problems.length - batchRejected.length;
      const nDiscarded = batchRejected.length;

      body.hidden = true;
      body.classList.remove('collapsed');
      strip.hidden = false;
      strip.innerHTML = `
        <span>&#10003; ${nAdded} added to bank &middot; ${nDiscarded} discarded</span>
        <span class="undo-link">undo</span>`;

      strip.querySelector('.undo-link').onclick = async () => {
        await api(`/api/batches/${batch.id}/undo-approve`, post());
        approved.delete(batch.id);
        body.hidden = false;
        strip.hidden = true;
        approveBtn.disabled = false;
        approveBtn.textContent = 'approve';
        updateCardTitle();
      };

      updateCardTitle();
    } catch (err) {
      approveBtn.disabled = false;
      approveBtn.textContent = 'approve';
      console.error('approve failed:', err);
    }
  };

  wrapper.appendChild(header);
  wrapper.appendChild(body);
  wrapper.appendChild(strip);
  return wrapper;
}

// ---- main -----------------------------------------------------------------
async function load() {
  try {
    const batches = await api('/api/staged');
    allBatches = batches;
    batches.forEach(b => collapsed.add(b.id));

    const root = document.getElementById('batches');
    root.innerHTML = '';

    if (batches.length === 0) {
      document.getElementById('empty').hidden = false;
      document.getElementById('card-title').textContent = '0 problems staged for approval';
      return;
    }

    batches.forEach(b => root.appendChild(renderBatch(b)));
    updateCardTitle();
  } catch (err) {
    console.error('load failed:', err);
    document.getElementById('card-title').textContent = 'error loading — is the server running?';
  }
}

load();
</script>
</body>
</html>
